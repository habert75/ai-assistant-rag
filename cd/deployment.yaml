apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-assistant-rag
  namespace: ai-assistant-rag
  labels:
    app: ai-assistant-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-assistant-rag
  template:
    metadata:
      labels:
        app: ai-assistant-rag
    spec:
      containers:
      - name: ai-assistant-rag
        image: ai-assistant-rag:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8503
          name: http
          protocol: TCP
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key
              key: OPENAI_API_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8503
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8503
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: docs-storage
          mountPath: /app/docs
      volumes:
      - name: docs-storage
        emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: ai-assistant-rag-svc
  namespace: ai-assistant-rag
  labels:
    app: ai-assistant-rag
spec:
  type: LoadBalancer
  ports:
  - port: 8503
    targetPort: 8503
    protocol: TCP
    name: http
  selector:
    app: ai-assistant-rag
